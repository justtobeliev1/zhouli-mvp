<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合乎周礼 - 现代处境判词引擎</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#faf9f6', // 模仿古籍纸张的颜色
                        foreground: '#2c2c2c',
                        primary: '#8b4513', // 古典的棕红色
                        'muted-foreground': '#666666',
                    },
                    animation: {
                        'clip-reveal': 'clipReveal 1.2s cubic-bezier(0, 0.55, 0.45, 1) forwards',
                        'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
                    },
                    keyframes: {
                        clipReveal: {
                            '0%': { clipPath: 'polygon(100% 0, 100% 0, 100% 100%, 100% 100%)' },
                            '100%': { clipPath: 'polygon(25% 0, 100% 0, 100% 100%, 0% 100%)' }
                        },
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
        }
        
        .font-serif {
            font-family: 'Ma Shan Zheng', cursive;
        }

        /* 延迟动画类 */
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
        .delay-500 { animation-delay: 500ms; }
    </style>
</head>
<body class="bg-background text-foreground min-h-screen flex items-center justify-center m-0 p-0">

    <section class="relative flex w-full flex-col overflow-hidden bg-background md:flex-row min-h-screen">
        
        <!-- Left Side: Content -->
        <div class="flex w-full flex-col justify-between p-8 md:w-1/2 md:p-12 lg:w-3/5 lg:p-16 z-10">
            <!-- Top Section: Logo & Main Content -->
            <div>
                <header class="mb-12 opacity-0 animate-fade-in-up">
                    <div class="flex items-center">
                        <div class="flex items-center justify-center w-10 h-10 rounded-full bg-primary text-white mr-3 font-serif text-xl">礼</div>
                        <div>
                            <p class="text-xl font-bold text-foreground tracking-widest font-serif">合乎周礼</p>
                            <p class="text-xs tracking-wider text-muted-foreground mt-1">现代处境 · 古人判词</p>
                        </div>
                    </div>
                </header>

                <main>
                    <h1 class="text-4xl font-bold leading-tight text-foreground md:text-5xl opacity-0 animate-fade-in-up delay-100">
                        这合乎周礼吗？<br />
                        <span class="text-primary font-serif font-normal text-5xl md:text-6xl mt-4 inline-block">让夫子为你评评理</span>
                    </h1>
                    <div class="my-8 h-1 w-20 bg-primary opacity-0 animate-fade-in-up delay-200"></div>
                    <p class="mb-10 max-w-md text-lg text-muted-foreground opacity-0 animate-fade-in-up delay-300 leading-relaxed">
                        把年轻人的现代处境翻译成古人判词卡。<br>一句话输入，秒出真引、意译、戏仿。<br>有问题，尽管问。比如：朋友鸽我两次还问我在不在？
                    </p>
                    <a href="index.html" class="inline-block px-8 py-4 bg-primary text-white text-lg font-bold tracking-widest transition-all hover:bg-primary/90 hover:shadow-lg rounded-sm opacity-0 animate-fade-in-up delay-400">
                        向夫子请教 →
                    </a>
                </main>
            </div>

            <!-- Bottom Section: Footer Info -->
            <footer class="mt-16 w-full opacity-0 animate-fade-in-up delay-500">
                <div class="grid grid-cols-1 gap-6 text-sm text-muted-foreground sm:grid-cols-3">
                    <div class="flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-3 text-primary"><circle cx="12" cy="12" r="10"></circle><line x1="2" x2="22" y1="12" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                        <span>zhouli.app</span>
                    </div>
                    <div class="flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-3 text-primary"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                        <span>古法传承</span>
                    </div>
                    <div class="flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-3 text-primary"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                        <span>鲁国曲阜</span>
                    </div>
                </div>
            </footer>
        </div>

        <!-- Right Side: Image with Clip Path Animation -->
        <div class="absolute inset-0 md:relative w-full min-h-[400px] md:min-h-screen md:w-1/2 lg:w-2/5 bg-cover bg-center animate-clip-reveal z-0 md:z-10 opacity-20 md:opacity-100"
             style="background-image: url('confucius.jpg'); clip-path: polygon(100% 0, 100% 0, 100% 100%, 100% 100%);">
        </div>
        
    </section>

</body>
</html>
